# Build Electron app for macOS, Windows, and Linux.
# - Push to main or "Run workflow" → build on all three OSes and upload artifacts.
# - Push a tag v* (e.g. v1.0.0) → same builds, then create a GitHub Release with installers.

name: Electron build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app and package Electron
        run: npm run electron:build
        env:
          ELECTRON: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-latest
          path: release-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-latest
          path: release-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-ubuntu-latest
          path: release-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-macos/*
            release-windows/*
            release-linux/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
